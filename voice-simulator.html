<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Simulator - TTL</title>
    <style>
        :root { --bg: #0a0c14; --text: #f1f5f9; --border: rgba(255,255,255,0.09); --blue: #3b82f6; --green: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; display: flex; justify-content: center; }
        .sim-container { width: 100%; max-width: 600px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .sim-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: space-between; }
        .sim-header h2 { margin: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .chat-box { flex: 1; height: 400px; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .msg { max-width: 85%; padding: 0.8rem 1rem; border-radius: 8px; font-size: 0.9rem; line-height: 1.4; animation: popIn 0.2s ease; }
        @keyframes popIn { from { transform: translateY(10px); opacity: 0; } to { transform: none; opacity: 1; } }
        .msg.bot { align-self: flex-start; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); }
        .msg.user { align-self: flex-end; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
        .msg.system { align-self: center; background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: var(--green); font-weight: 700; font-size: 0.8rem; text-align: center; }
        .input-area { padding: 1rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; background: rgba(0,0,0,0.2); }
        .input-area input { flex: 1; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; font-family: inherit; font-size: 0.9rem; }
        .input-area button { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; background: var(--blue); color: #fff; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .input-area button:hover { background: #2563eb; }
        .phone-label { font-size: 0.75rem; color: #7e8faa; display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 1.5rem; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="sim-container">
    <div class="sim-header">
        <h2><div class="status-dot"></div> Twilio Voice AI Mock</h2>
        <span style="font-size: 0.8rem; color: #7e8faa;">Model: ttl-voice-intake</span>
    </div>
    <div class="phone-label">
        <span>Incoming Call from: +1 (555) 123-4567</span>
        <button onclick="startCall()" style="background: none; border: 1px solid var(--border); color: #fff; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer;">Dial Call</button>
    </div>
    
    <div class="chat-box" id="chat">
        <div style="text-align: center; color: #7e8faa; font-size: 0.8rem; margin-top: 2rem;">Click "Dial Call" to begin the simulation.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type what you would say on the phone..." disabled>
        <button id="sendBtn" onclick="sendMessage()" disabled>Speak</button>
    </div>
</div>

<script>
    const sessionId = 'session_' + Date.now();
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function startCall() {
        chat.innerHTML = '';
        addMessage('📞 Call Connected...', 'system');
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
        
        // Initial ping to get greeting
        await apiCall('Hello');
    }

    async function sendMessage() {
        const val = input.value.trim();
        if (!val) return;
        addMessage(val, 'user');
        input.value = '';
        await apiCall(val);
    }

    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    async function apiCall(message) {
        try {
            const res = await fetch('http://localhost:3005/api/voice-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, message })
            });
            const data = await res.json();
            
            setTimeout(() => {
                addMessage(`<strong>Voice AI:</strong> ${data.reply}`, 'bot');
                
                if (data.triggerSMS) {
                    setTimeout(() => {
                        // Mock the backend SMS firing
                        fetch('http://localhost:3005/api/trigger-sms', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ phone: "+1 (555) 123-4567" })
                        });
                        addMessage('📲 [Backend Webhook Triggered]: Twilio SMS Sent to Caller!', 'system');
                    }, 1000);
                }
            }, 600);
        } catch (e) {
            addMessage('⚠️ Error: Make sure the Voice AI backend is running on port 3005.', 'system');
        }
    }
</script>

</body>
</html>
